<div class="max-w-2xl space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-slate-800">Configurações</h1>
    <p class="text-slate-500 text-sm">Personalize as informações da sua clínica</p>
  </div>

  @if (saved()) {
    <div class="bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3 text-sm">
      Configurações salvas com sucesso!
    </div>
  }

  <div class="bg-white rounded-xl border border-slate-200 p-6">
    @if (loading()) {
      <div class="flex justify-center py-8"><mat-spinner diameter="32" /></div>
    } @else {
      <form [formGroup]="form" (ngSubmit)="save()" class="flex flex-col gap-4">
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Nome da clínica</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Telefone</mat-label>
          <input matInput formControlName="phone" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Endereço</mat-label>
          <input matInput formControlName="address" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Mensagem de boas-vindas</mat-label>
          <textarea matInput formControlName="welcomeMessage" rows="3"></textarea>
        </mat-form-field>

        <div class="flex items-center gap-3">
          <label class="text-sm text-slate-600">Cor principal</label>
          <input type="color" formControlName="primaryColor"
            class="w-10 h-10 rounded border border-slate-200 cursor-pointer p-0.5" />
          <span class="text-sm text-slate-400">{{ form.get('primaryColor')?.value }}</span>
        </div>

        <div class="flex justify-end">
          <button mat-flat-button type="submit" [disabled]="saving() || form.invalid">
            @if (saving()) { <mat-spinner diameter="20" class="inline-block" /> }
            @else { Salvar alterações }
          </button>
        </div>
      </form>
    }
  </div>
</div>
